# Single-simulation mode for the IEEE 14-bus system.
#
#   python -m pylectra run examples/single_case14.yaml --no-plot
#
# Three-phase short-circuit at bus 4, 50 ms duration. Dynamic data from
# PSAT d_014_dyn (Milano, 2010) — 1 generator + 4 synchronous condensers.

mode: single

case_pf: case14
case_dyn: case14dyn

power_flow:
  kind: newton

solver:
  kind: modified_euler
  options: {}

fault:
  kind: bus_fault
  params:
    bus: 4
    t_fault: 0.2
    duration: 0.05

verbose: 1
plot: true
