mode: single
case_pf: case39
case_dyn: case39dyn
plot: false
verbose: 1

fault:
  kind: bus_fault
  params:
    bus: 16
    t_fault: 0.2
    duration: 0.05

solver:
  kind: torch_dopri5
  options:
    rtol: 1.0e-7
    atol: 1.0e-9
    device: auto         # cuda > cpu (MPS skipped at float64; Apple silicon goes CPU)
    torch_dtype: float64 # use float32 to enable MPS at the cost of precision
    dense_n: 200         # output samples per leg

power_flow:
  kind: newton
