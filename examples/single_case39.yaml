# Single-simulation mode (mirrors the legacy TimedomainSim demo).
#
#   cd python && python -m pylectra run examples/single_case39.yaml --no-plot
#
# Reproduces the 3-cycle bus-16 fault on case39 and prints simulation timing.

mode: single

case_pf: case39
case_dyn: case39dyn

power_flow:
  kind: newton

solver:
  kind: modified_euler
  options: {}

fault:
  kind: bus_fault
  params:
    bus: 16
    t_fault: 0.2
    duration: 0.05

verbose: 1
plot: true
